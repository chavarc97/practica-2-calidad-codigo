name: SonarQube / Ruff Analysis
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies and Linter
        run: |
          pip install ruff
      - name: Run Ruff (Linter)
        run: |
          ruff check . --output-format=pylint > ruff-report.txt || true
      - name: Install SonarScanner
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl
          curl -sSLo sonar.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.1.0.4477-linux.zip
          unzip sonar.zip -d $HOME
          echo "$HOME/sonar-scanner-6.1.0.4477-linux/bin" >> $GITHUB_PATH
      - name: Run Sonar Scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=python-advanced-demo \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://your-sonarqube-server:9000 \
            -Dsonar.python.pylint.reportPaths=ruff-report.txt \
            -Dsonar.login=$SONAR_TOKEN